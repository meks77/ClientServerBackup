import org.apache.tools.ant.filters.ReplaceTokens

plugins {
	id 'java'
	id 'io.quarkus' version '1.5.2.Final'
//	id "org.jetbrains.kotlin.jvm"
	id "org.jetbrains.kotlin.plugin.allopen" version "1.3.61"
}

repositories {
	mavenCentral()
	mavenLocal()
	gradlePluginPortal()
}

sourceCompatibility = 11

dependencies {
	implementation 'io.quarkus:quarkus-resteasy-jackson'
	implementation 'com.fasterxml.jackson.module:jackson-module-kotlin:2.10.2'
	implementation enforcedPlatform('io.quarkus:quarkus-bom:1.5.2.Final')
	implementation 'io.quarkus:quarkus-resteasy'
//	implementation 'io.quarkus:quarkus-kotlin'

	testImplementation 'io.quarkus:quarkus-junit5'
	testImplementation 'io.rest-assured:rest-assured'

	compile project (':common')
	implementation ('io.jsondb:jsondb-core:1.0.85')
	implementation('com.google.guava:guava:27.0.1-jre')
	implementation('commons-io:commons-io:2.6')
	implementation 'at.meks:easy-validation-args:2.0.0-RC3'

	annotationProcessor 'org.projectlombok:lombok:1.18.4'
	testAnnotationProcessor 'org.projectlombok:lombok:1.18.4'
	compileOnly 'org.projectlombok:lombok:1.18.4'
	testCompile 'org.projectlombok:lombok:1.18.4'

	testImplementation('org.junit.jupiter:junit-jupiter:5.6.0')
	testRuntime("org.junit.jupiter:junit-jupiter-engine:5.6.0")
	testRuntime("org.junit.platform:junit-platform-runner:1.6.0")

	testImplementation('org.mockito:mockito-core:3.2.4')
	testImplementation('org.mockito:mockito-junit-jupiter:3.2.4')
	testImplementation('org.assertj:assertj-core:3.14.0')

}

allOpen {
	annotation("javax.ws.rs.Path")
	annotation("javax.enterprise.context.ApplicationScoped")
	annotation("io.quarkus.test.junit.QuarkusTest")
}

processResources {
	expand(BUILD_DIR : project.buildDir.toString())
}

