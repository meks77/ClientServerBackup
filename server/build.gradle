plugins {
	id 'java'
	id 'io.quarkus' version '1.2.0.Final'
}

repositories {
	mavenCentral()
	mavenLocal()
	gradlePluginPortal()
}

sourceCompatibility = 1.8

dependencies {
//	implementation 'org.axonframework:axon-messaging:4.2.1'
//	implementation 'org.axonframework:axon-modelling:4.2.1'
//	implementation 'org.axonframework:axon-eventsourcing:4.2.1'
//	implementation 'org.axonframework:axon-configuration:4.2.1'
//	implementation 'org.axonframework:axon-configuration:4.2.1'

	testImplementation 'org.axonframework:axon-test:4.2.1'

	implementation 'io.quarkus:quarkus-resteasy-jsonb'
	implementation enforcedPlatform('io.quarkus:quarkus-bom:1.2.0.Final')
	implementation 'io.quarkus:quarkus-resteasy'

	testImplementation 'io.quarkus:quarkus-junit5'
	testImplementation 'io.rest-assured:rest-assured'

	compile project (':common')
	compileOnly project (':client')
	implementation ('io.jsondb:jsondb-core:1.0.85')
	implementation('com.google.guava:guava:27.0.1-jre')
	implementation('commons-io:commons-io:2.6')
	implementation 'at.meks:easy-validation:1.0.0'

	annotationProcessor 'org.projectlombok:lombok:1.18.4'
	testAnnotationProcessor 'org.projectlombok:lombok:1.18.4'
	compileOnly 'org.projectlombok:lombok:1.18.4'
	testCompile 'org.projectlombok:lombok:1.18.4'

	testImplementation('org.junit.jupiter:junit-jupiter:5.6.0')
	testRuntime("org.junit.jupiter:junit-jupiter-engine:5.6.0")
	testRuntime("org.junit.platform:junit-platform-runner:1.6.0")

	testCompile project (':testUtils')
	testImplementation('org.mockito:mockito-core:3.2.4')
	testImplementation('org.mockito:mockito-junit-jupiter:3.2.4')
	testImplementation('org.assertj:assertj-core:3.14.0')

}

def webappDir = "$projectDir/src/main/webapp"
sourceSets {
	main {
		resources {
			srcDirs = ["$webappDir/dist", "$projectDir/src/main/resources"]
		}
	}
}

task cleanClientFiles(type: Delete) {
//	without deleting the client dist isn't replaced
	delete fileTree("src").matching {
		include "/main/webapp/src/assets/clients/*"
	}
}

task copyClientFiles(type: Copy) {
	from "$projectDir/../client/build/distributions"
	include "*.zip"
	into "$projectDir/src/main/webapp/src/assets/clients"
	rename '(client).*(.zip)',  '$1$2'
}

processResources {
	dependsOn "cleanClientFiles"
	dependsOn "copyClientFiles"
	dependsOn "buildAngular"
}

task buildAngular(type:Exec) {
	dependsOn "installAngular"
	workingDir "$webappDir"
	inputs.dir "$webappDir"
	// Add task to the standard build group
	group = BasePlugin.BUILD_GROUP
	// ng doesn't exist as a file in windows -> ng.cmd
	if (System.getProperty("os.name").toUpperCase().contains("WINDOWS")){
		commandLine "ng.cmd", "build"
	} else {
		commandLine "ng", "build"
	}
}

task installAngular(type:Exec) {
	workingDir "$webappDir"
	inputs.dir "$webappDir"
	group = BasePlugin.BUILD_GROUP
	if (System.getProperty("os.name").toUpperCase().contains("WINDOWS")){
		commandLine "npm.cmd", "install"
	} else {
		commandLine "npm", "install"
	}
}

compileJava {
	options.compilerArgs << '-parameters'
}
